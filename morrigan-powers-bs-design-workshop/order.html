<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services & Pricing</title> <!-- Fixed broken span tags inside title -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Chivo:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body> <!-- Added missing opening body tag -->

<!-- Top Fixed Navigation Bar -->
<header class="site-header">
    <a href="index.html" class="brand-container" style="text-decoration: none;">
        <img src="assets/images/monogram.svg" alt="Logo" class="nav-logo-svg">
        <div class="brand-text">
            <span class="main-title"><span class="biz-name"></span></span>
            <span class="sub-title"><span class="biz-subtitle"></span></span>
        </div>
    </a>
    <nav class="main-nav">
        <a href="services-pricing.html">Services & Pricing</a>
        <a href="about.html">My Story</a>
        <a href="../index.html" class="nav-cta-btn">View Code Portfolio</a>
    </nav>
</header>

<main class="services-standalone-page">
    <!-- Keep site-construction class here to hide everything inside -->
    <section class="services-pricing-section site-construction">
        <div class="contact-section">
            <h2>Project Intake Form</h2>
            <p class="section-desc">Select your package below to secure your production slot between my class schedules.</p>
            
            <!-- Web3Forms Integration -->
            <form action="https://web3forms.com" method="POST" class="contact-form-grid">
                <input type="hidden" name="access_key" value="YOUR-API-KEY-HERE">
                <input type="hidden" name="redirect" value="success.html">
                
                <!-- Client Contact Info -->
                <div class="form-group">
                    <label for="client-name">Your Name</label>
                    <input type="text" id="client-name" name="name" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <label for="client-email">Email Address</label>
                    <input type="email" id="client-email" name="email" placeholder="lorem@ipsum.com" required>
                </div>
                
                <!-- Package Dropdown Selection -->
                <div class="form-group full-width">
                    <label for="package-select">Select a Service Package</label>
                    <select id="package-select" name="package" required style="width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid var(--text-muted); border-radius: 4px;">
                        <option value="" disabled selected>-- Choose an option --</option>
                        <option value="web-footprint">The Digital Footprint Package ($300)</option>
                        <option value="pet-engraving">Bespoke Pet & Portrait Engraving ($45+)</option>
                        <option value="media-session">Commercial Photography & Video ($150–$300)</option>
                        <option value="stationery-print">Custom Print-Ready Stationery ($100)</option>
                        <option value="stationery-kit">The Mini-Brand Stationery Kit ($150)</option>
                    </select>
                </div>
                
                <!-- Project Briefing Textarea -->
                <div class="form-group full-width">
                    <label for="project-notes">Project Details / Goals</label>
                    <textarea id="project-notes" name="notes" rows="6" placeholder="Tell me a bit about your business, the pet name for engraving, or your photography timeline needs..." required></textarea>
                </div>
                
                <!-- Submit Button -->
                <div class="form-group full-width">
                    <button type="submit" class="form-submit-btn">Submit Order Request</button>
                </div>
            </form>
        </div>
    </section>
</main> <!-- Fixed proper closing hierarchy order -->

<!-- Global Studio Footer -->
<footer class="site-footer">
    <div class="footer-container">
        <div class="footer-info">
            <span class="footer-brand biz-name"></span>
            <p class="footer-tagline"><span class="biz-subtitle"></span></p>
            <p class="footer-copyright">&copy; <span class="biz-copyright"></span> <span class="biz-owner"></span> | <span class="biz-name"></span>. All Rights Reserved.</p>
            <div class="legal-links">
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Service</a>
            </div>
        </div>
        <div class="footer-contact">
            <h2>Connect with the Studio</h2>
            <div class="contact-links">
                <a href="#" id="biz-email-link" class="contact-item">
                    <span class="contact-icon">✉</span>
                    <span class="biz-email"></span>
                </a>
                <span class="contact-item">
                    <span class="contact-icon">📍</span>
                    <span class="biz-address"></span>
                </span>
            </div>
        </div>
    </div>
</footer>

<!-- Connected Central Configuration and Injection Automation Scripts -->
<script src="config.js"></script>
<script>
    window.onload = function() {
        // Sync Browser Tab Title Layout
        document.title = "Services | " + businessConfig.name;
        
        // Loop and overwrite element containers
        document.querySelectorAll('.biz-name').forEach(el => el.textContent = businessConfig.name);
        document.querySelectorAll('.biz-subtitle').forEach(el => el.textContent = businessConfig.subtitle);
        document.querySelectorAll('.biz-owner').forEach(el => el.textContent = businessConfig.owner);
        document.querySelectorAll('.biz-phone').forEach(el => el.textContent = businessConfig.phone);
        document.querySelectorAll('.biz-email').forEach(el => el.textContent = businessConfig.email);
        document.querySelectorAll('.biz-copyright').forEach(el => el.textContent = businessConfig.copyright);
        document.querySelectorAll('.biz-address').forEach(el => el.textContent = businessConfig.address);
        
        // Bind interactive email redirection anchor
        const emailLink = document.getElementById('biz-email-link');
        if(emailLink) {
            emailLink.href = "mailto:" + businessConfig.email;
        }
    }
</script>
</body>
</html>
